<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula del Futuro - Tier 3: Aula del Futuro</title>
  <script src="lib/aframe.min.js"></script>
  <script>if (typeof AFRAME === 'undefined') { document.write('<script src="https://aframe.io/releases/1.6.0/aframe.min.js"><\/script>'); }</script>
  <link rel="stylesheet" href="../assets/css/demo-common.css">
  <script>
    function startExperience() {
      document.getElementById('overlay').style.display = 'none';
      var canvas = document.querySelector('a-scene canvas');
      if (canvas) canvas.focus();
    }
    document.addEventListener('DOMContentLoaded', function () {
      if ('ontouchstart' in window) {
        var k = document.querySelectorAll('#overlay .keys');
        if (k[0]) k[0].textContent = 'Toca el piso para moverte';
        if (k[1]) k[1].textContent = 'Arrastra con un dedo para mirar';
      }
      var scene = document.querySelector('a-scene');
      if (scene) scene.addEventListener('loaded', function () {
        var lm = document.querySelector('.loading-msg');
        var sb = document.querySelector('.start');
        if (lm) lm.style.display = 'none';
        if (sb) sb.style.display = '';
      });
    });
  </script>
</head>
<body>

<!-- WELCOME OVERLAY -->
<div id="overlay" tabindex="0" role="button" aria-label="Click para comenzar" onclick="startExperience()" onkeydown="if(event.key==='Enter'||event.key===' ')startExperience()">
  <h1>Aula del Futuro</h1>
  <p class="subtitle">Tier 3: Espacio con las 6 zonas de aprendizaje</p>
  <p class="keys">W A S D o Click en el piso para moverse</p>
  <p class="keys">Rat&oacute;n para mirar alrededor</p>
  <p class="keys">Ac&eacute;rcate a las zonas para ver informaci&oacute;n</p>
  <p class="loading-msg">Cargando escena&hellip;</p>
  <p class="start" style="display:none">Click para comenzar</p>
</div>

<!-- TIER SWITCHER -->
<div id="tier-switcher">
  <a href="tier1.html" class="tier-btn">1. T&iacute;pico</a>
  <a href="tier2.html" class="tier-btn">2. Adaptado</a>
  <a class="tier-btn active t3">3. Futuro</a>
</div>

<!-- ZONE HUD -->
<div id="zone-hud"></div>

<!-- BACK TO HUB -->
<a id="back-hub" href="../index.html">&larr; Inicio</a>

<!-- NAV BUTTON -->
<a id="nav-btn" href="../documento/primaria-secundaria.html" target="_blank" rel="noopener">&#x1F4C4; Ver Documento</a>

<!-- CUSTOM COMPONENTS -->

<script src="components/proximity-panel.js"></script>
<script src="components/zone-label.js"></script>

              wasd-controls="acceleration: 30"

                raycaster="objects: .walkable; far: 30"></a-entity>
    </a-entity>
  </a-entity>

  <!-- GLOBAL LIGHTING -->
  <a-entity light="type: ambient; color: #E8F0FE; intensity: 0.4"></a-entity>

<script>
(function () {
  var zones = [
    { name: 'Investigar', x: -5, z: 2, color: '#1565C0', r: 4 },
    { name: 'Crear', x: 5, z: 2, color: '#E65100', r: 4 },
    { name: 'Intercambiar', x: -5, z: -6, color: '#2E7D32', r: 4 },
    { name: 'Desarrollar', x: 5, z: -6, color: '#6A1B9A', r: 4 },
    { name: 'Presentar', x: 0, z: -13, color: '#C62828', r: 6 },
    { name: 'Conectar', x: 0, z: 10, color: '#00838F', r: 4 }
  ];
  var hud = document.getElementById('zone-hud');
  var current = '';

  function update() {
    var scene = document.querySelector('a-scene');
    if (!scene || !scene.camera) return;
    var cam = scene.camera.el;
    if (!cam) return;
    var wp = new THREE.Vector3();
    cam.object3D.getWorldPosition(wp);

    var found = '';
    var foundColor = '';
    for (var i = 0; i < zones.length; i++) {
      var z = zones[i];
      var dx = wp.x - z.x;
      var dz = wp.z - z.z;
      if (Math.sqrt(dx * dx + dz * dz) < z.r) {
        found = z.name;
        foundColor = z.color;
        break;
      }
    }

    if (found !== current) {
      current = found;
      if (found) {
        var idx = -1;
        for (var j = 0; j < zones.length; j++) { if (zones[j].name === found) { idx = j + 1; break; } }
        hud.textContent = 'Zona ' + idx + '/6: ' + found;
        hud.style.borderColor = foundColor;
        hud.style.display = 'block';
      } else {
        hud.textContent = 'Explorando\u2026';
        hud.style.borderColor = '#4DD0E1';
        hud.style.display = 'block';
      }
    }
  }

  setInterval(update, 300);
})();
</script>
